<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>모듈 레지스트리 테스트</title>
        <style>
            body {
                margin: 0;
                padding: 24px;
                background: #101828;
                color: #f9fafb;
                font-family: system-ui, sans-serif;
            }

            h1 {
                margin: 0 0 16px;
                font-size: 24px;
            }

            .test-result {
                margin: 8px 0;
                padding: 10px 12px;
                border: 1px solid #344054;
                border-radius: 6px;
                background: #1d2939;
            }

            .success {
                border-color: #12b76a;
            }

            .error {
                border-color: #f04438;
            }
        </style>
    </head>
    <body>
        <h1>모듈 레지스트리 테스트</h1>
        <div id="test-results"></div>

        <script type="module">
            const results = document.getElementById('test-results');
            const requiredModules = [
                'constants',
                'audio',
                'storage',
                'gameSessionController',
                'gameTimerController',
                'answerInputController',
                'answerCandidates',
                'quizPartialLoader',
                'quizPartialsManifest',
                'startModalController',
                'spellingQuiz',
                'resultImageActions',
            ];

            function addResult(message, type = 'success') {
                const div = document.createElement('div');
                div.className = `test-result ${type}`;
                div.textContent = message;
                results.appendChild(div);
            }

            await import('./modules/module-registry.js');

            if (!window._modules) {
                addResult(
                    'window._modules 레지스트리를 찾을 수 없습니다.',
                    'error'
                );
            } else {
                addResult(
                    `레지스트리 로드 완료: ${
                        Object.keys(window._modules).length
                    }개 모듈`
                );

                for (const name of requiredModules) {
                    addResult(
                        `${name}: ${window._modules[name] ? '로드됨' : '누락'}`,
                        window._modules[name] ? 'success' : 'error'
                    );
                }
            }
        </script>
    </body>
</html>
