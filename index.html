        <a href="#main-content" class="skip-link">본문 바로가기</a>

        <header role="banner">
            <div class="hud-left">
                <h1 id="header-title">아웃풋</h1>

                <div id="combo-counter" class="hidden" aria-live="polite"></div>
            </div>

            <div class="hud-center">
                <div id="timer-container" class="kitsch-box hidden">
                    <div id="time">20:00</div>

                    <div id="bar"><div></div></div>
                </div>

                <div
                    id="slot-machine"
                    class="slot-machine hidden"
                    aria-hidden="true"
                >

                    <div class="reel">?</div>

                    <div class="reel">?</div>
                </div>
            </div>

            <div class="hud-right">

                <button id="scrap-result-image-btn-top" class="btn hidden">
                    결과창 복사
                </button>

                <button id="reset-btn" class="btn hidden">처음으로</button>
            </div>
        </header>

            오늘 푼 빈칸

        <div id="character-assistant" class="idle">

                </div>

                <div class="mushroom-cap">

                    <div class="dot"></div>

                    <div class="dot"></div>

                    <div class="spore-container"></div>
                </div>

                <div class="mushroom-stem">
                    <div class="character-eye left"></div>

                    <div class="character-eye right"></div>
                </div>

                <div class="fire-effect">
                    <div class="flame"></div>
                    <div class="flame"></div>
                    <div class="flame"></div>
                    <div class="flame"></div>
                    <div class="flame"></div>
                </div>
            </div>

                    </div>
                </div>

                <h2 id="result-title">게임 결과</h2>

                <div id="result-info">

                        <p>
                            <span class="label">주제:</span>
                            <span id="result-topic"></span>
                        </p>

                        <p>
                            <span class="label">과목:</span>
                            <span id="result-subject"></span>
                        </p>

                        <p>
                            <span class="label">맞힌 개수:</span>

                            <span id="total-count">0</span>

                        </div>

                            </div>
                        </div>

                        <div class="sound-section">
                            <h2>효과음</h2>

                            <div id="sound-toggle-container">
                                <label
                                    for="sound-toggle"
                                    class="sound-toggle-label"
                                >
                                    <span class="sound-toggle-text"
                                        >효과음</span
                                    >
                                    <div class="sound-toggle-switch">
                                        <input
                                            type="checkbox"
                                            id="sound-toggle"
                                            checked
                                        />
                                        <span
                                            class="sound-toggle-slider"
                                        ></span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 시작 버튼 -->
                    <button id="start-game-btn" class="btn">시작</button>
                </div>

                <div id="heatmap-group">
                    <div id="heatmap-panel" class="modal-content">
                        <h2 id="heatmap-title">
                            <span class="heatmap-label">오늘 푼 빈칸</span>
                            <span id="heatmap-count">0</span>개
                        </h2>

                        <button
                            id="expand-heatmap-btn"
                            class="expand-heatmap-btn"
                            aria-label="6개월 히트맵 보기"
                            title="6개월 히트맵 보기"
                        >
                            +
                        </button>

                        <div id="activity-heatmap"></div>
                    </div>

                    <div
                        id="dday-panel"
                        class="modal-content"
                        aria-live="polite"
                    >
                        <h2 class="sr-only">디데이</h2>

                        <div id="dday"></div>

                        <div
                            id="dday-race"
                            role="img"
                            aria-label="디데이 달리기 경주 진행도"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 6개월 히트맵 팝업 모달 -->
        <div
            id="six-month-heatmap-modal"
            class="modal-overlay hidden"
            role="dialog"
            aria-modal="true"
            aria-labelledby="six-month-heatmap-title"
        >
            <div class="six-month-heatmap-content">
                <button
                    id="close-six-month-heatmap"
                    class="close-modal-btn"
                    aria-label="닫기"
                >
                    &times;
                </button>
                <h2 id="six-month-heatmap-title">6개월 간 학습 활동 히트맵</h2>
                <div id="six-month-heatmap-container"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

        <!-- === 개발자 도구용 모듈 레지스트리 === -->
        <script type="module" src="modules/module-registry.js"></script>

        <!-- === 효과음 스위치 기능 === -->
        <script type="module" src="modules/sound-settings.js"></script>

        <!-- === 애플리케이션 부트스트랩 === -->
        <script type="module" src="app.js"></script>
    </body>
</html>
