<section id="problem-solving">
    <h2>문제해결학습모형</h2>

    <div class="grade-container">
        <div>
            <table>
                <tbody>
                    <tr>
                        <th>특징</th>
                        <td>
                            <div class="overview-question">
                                [목적]:
                                <input
                                    data-answer="문제해결력"
                                    aria-label="문제해결력"
                                    placeholder="정답"
                                />
                            </div>

                            <div class="overview-question">
                                [문제의 성격]:
                                <input
                                    data-answer="일상적 문제 (사회적)"
                                    aria-label="일상적 문제 (사회적)"
                                    placeholder="정답"
                                />
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <th>단계</th>
                        <td>
                            <input
                                data-answer="문제 확인"
                                aria-label="문제 확인"
                                placeholder="단계명"
                            />

                            <input
                                data-answer="문제 발생 원인 파악"
                                aria-label="문제 발생 원인 파악"
                                placeholder="단계명"
                            />
                            <div class="overview-question">
                                ㄴ 자료
                                <input
                                    data-answer="수집"
                                    aria-label="수집"
                                    placeholder="정답"
                                />
                                및
                                <input
                                    data-answer="분석"
                                    aria-label="분석"
                                    placeholder="정답"
                                />(<input
                                    data-answer="신뢰성"
                                    aria-label="신뢰성"
                                    placeholder="정답"
                                />과
                                <input
                                    data-answer="타당성"
                                    aria-label="타당성"
                                    placeholder="정답"
                                />)
                            </div>

                            <input
                                data-answer="문제 해결방안 탐색"
                                aria-label="문제 해결방안 탐색"
                                placeholder="단계명"
                            />

                            <input
                                data-answer="문제 해결방안 결정"
                                aria-label="문제 해결방안 결정"
                                placeholder="단계명"
                            />
                            <div class="overview-question">
                                ㄴ ① 문제 해결 방안 선택의
                                <input
                                    data-answer="결과 비교·분석"
                                    aria-label="결과 비교·분석"
                                    placeholder="정답"
                                />
                            </div>
                            <div class="overview-question">
                                ㄴ ②
                                <input
                                    data-answer="최적의 방안 결정"
                                    aria-label="최적의 방안 결정"
                                    placeholder="정답"
                                />
                            </div>

                            <input
                                data-answer="문제 해결방안 실천"
                                aria-label="문제 해결방안 실천"
                                placeholder="단계명"
                            />
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
